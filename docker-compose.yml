version: "3.9"

services:
  db:
    image: postgres:15-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: opspulse
      POSTGRES_USER: opspulse
      POSTGRES_PASSWORD: opspulse
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U opspulse"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build: ./backend
    restart: unless-stopped
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL: postgresql://opspulse:opspulse@db:5432/opspulse
      DEBUG: "false"
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - ./backend/data:/app/data

  seed:
    build: ./backend
    command: python -m app.seed.seed_data
    environment:
      DATABASE_URL: postgresql://opspulse:opspulse@db:5432/opspulse
    depends_on:
      db:
        condition: service_healthy
      backend:
        condition: service_healthy
    profiles: ["seed"]

  frontend:
    build: ./frontend
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:8000
    depends_on:
      - backend

volumes:
  postgres_data:
